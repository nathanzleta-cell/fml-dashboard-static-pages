<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FML Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0a0a0b; 
            color: #f3f4f6; 
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        [x-cloak] { display: none !important; }
        .bg-dark-card { background-color: #161618; border: 1px solid #1f2937; }
        
        /* Mobile Touch Fixes */
        button, a, [role="button"] {
            cursor: pointer;
            touch-action: manipulation;
            pointer-events: auto !important;
        }
    </style>
</head>
<body x-data="{ activeTab: 'dashboard' }" class="min-h-screen flex flex-col">
    <!-- Top Mobile Header -->
    <header class="bg-[#0a0a0b] border-b border-gray-800 p-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold text-blue-500 tracking-tighter">FML PLATFORM</h1>
        <div class="flex items-center space-x-3">
            <button class="p-2 bg-gray-800/50 rounded-lg"><i class="far fa-bell"></i></button>
            <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center font-bold text-xs">NZ</div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 p-4 pb-24 overflow-y-auto">
        <div x-show="activeTab === 'dashboard'" x-cloak>
            <h2 class="text-2xl font-bold mb-6">Logistics Overview</h2>
            
            <!-- Quick Stats -->
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-dark-card p-4 rounded-xl">
                    <div class="text-gray-400 text-[10px] font-bold uppercase mb-1">In Transit</div>
                    <div class="text-2xl font-bold">12</div>
                </div>
                <div class="bg-dark-card p-4 rounded-xl border-l-4 border-yellow-500">
                    <div class="text-gray-400 text-[10px] font-bold uppercase mb-1">Pending</div>
                    <div class="text-2xl font-bold text-yellow-500">$24k</div>
                </div>
            </div>

            <!-- Main Shipment Card -->
            <div class="bg-dark-card rounded-xl overflow-hidden mb-6" x-data="{ open: true }">
                <div @click="open = !open" class="p-4 bg-[#1c1c1f] flex justify-between items-center border-b border-gray-800">
                    <div>
                        <div class="text-[9px] font-bold text-blue-400 uppercase tracking-widest">MBL Tracking</div>
                        <div class="text-lg font-mono font-bold">HLCUMA3260472865</div>
                    </div>
                    <i class="fas fa-chevron-down transition-transform" :class="open ? 'rotate-180' : ''"></i>
                </div>
                <div x-show="open" class="p-4 space-y-4">
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-gray-400">ETA</span>
                        <span class="font-bold text-blue-400">June 3, 2026</span>
                    </div>
                    <div class="p-3 bg-[#0a0a0b] rounded-lg border border-gray-800">
                        <div class="text-xs font-bold text-gray-500 mb-2 uppercase">Container: HLXU8415406</div>
                        <div class="grid grid-cols-2 gap-2">
                            <div class="bg-[#161618] p-2 rounded text-[10px]">Haselson: 400</div>
                            <div class="bg-[#161618] p-2 rounded text-[10px]">Reason: 200</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Risk Alert -->
            <div class="bg-red-500/10 border border-red-500/20 p-4 rounded-xl">
                <div class="flex items-center text-red-500 text-[10px] font-bold uppercase mb-2">
                    <i class="fas fa-exclamation-triangle mr-2"></i> Critical Risk
                </div>
                <p class="text-xs text-gray-300 leading-relaxed mb-4">
                    APM Terminals congestion: 82% risk of Detention for HLXU8415406.
                </p>
                <button @click="alert('Dispatch Notified')" class="w-full bg-red-600 text-white text-xs font-bold py-3 rounded-lg active:bg-red-700 transition">
                    NOTIFY DISPATCH
                </button>
            </div>
        </div>

        <div x-show="activeTab === 'shipments'" x-cloak>
            <h2 class="text-2xl font-bold mb-4">Shipments</h2>
            <div class="bg-dark-card p-8 rounded-xl text-center">
                <i class="fas fa-sync fa-spin text-2xl text-blue-500 mb-4"></i>
                <p class="text-sm text-gray-500 uppercase font-bold">Syncing Label_6170267226485901986...</p>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#0a0a0b] border-t border-gray-800 flex justify-around p-2 z-50">
        <button @click="activeTab = 'dashboard'" :class="activeTab === 'dashboard' ? 'text-blue-500' : 'text-gray-500'" class="flex flex-col items-center p-2">
            <i class="fas fa-th-large text-lg"></i>
            <span class="text-[10px] mt-1 font-bold">Dash</span>
        </button>
        <button @click="activeTab = 'shipments'" :class="activeTab === 'shipments' ? 'text-blue-500' : 'text-gray-500'" class="flex flex-col items-center p-2">
            <i class="fas fa-box text-lg"></i>
            <span class="text-[10px] mt-1 font-bold">Shipments</span>
        </button>
        <button @click="activeTab = 'settings'" :class="activeTab === 'settings' ? 'text-blue-500' : 'text-gray-500'" class="flex flex-col items-center p-2">
            <i class="fas fa-cog text-lg"></i>
            <span class="text-[10px] mt-1 font-bold">Settings</span>
        </button>
    </nav>
</body>
</html>
